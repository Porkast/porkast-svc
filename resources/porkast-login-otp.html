<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porkast login code</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4efe6;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }
    .shell {
      width: 100%;
      padding: 32px 16px;
      box-sizing: border-box;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(249,244,237,0.96));
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(102, 71, 38, 0.14);
      border: 1px solid rgba(192, 157, 119, 0.25);
    }
    .eyebrow {
      color: #a16207;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
      line-height: 1.6;
      font-size: 15px;
    }
    .code {
      margin: 24px 0;
      padding: 20px;
      text-align: center;
      font-size: 38px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.28em;
      color: #111827;
      background: rgba(255,255,255,0.9);
      border-radius: 22px;
      border: 1px solid rgba(192, 157, 119, 0.28);
    }
    .footnote {
      margin-top: 24px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="eyebrow">Porkast Access</div>
      <h1>Your sign in code</h1>
      <p>Use this one time password to continue in Porkast.</p>
      <div class="code">{{ code }}</div>
      <p>This code expires in {{ expiresMinutes }} minutes. If you did not request it, you can safely ignore this email.</p>
      <div class="footnote">Discover, subscribe, and build the podcast library that fits your listening life.</div>
    </div>
  </div>
</body>
</html>
